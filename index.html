<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grasshopper Daily – Path Puzzle</title>
<meta name="description" content="Grasshopper Daily is a free daily path puzzle game where you leap across a grid like a grasshopper. Solve hand-crafted puzzles, track your streaks, and share your results!">
<meta name="keywords" content="grasshopper daily, path puzzle, daily puzzle, logic game, jumping puzzle, brain teaser, free puzzle game">

<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 10px;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
  }
  h1 { margin: 0.3em 0; font-size: 2.1rem; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }
  #subtitle { opacity: 0.9; margin-bottom: 1rem; font-size: 1rem; }

  #menu, #game-container, #archive-container, #stats-container, #howto-container, #legal-container {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 1.5rem;
    margin: 1rem auto;
    max-width: 700px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  #menu-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 1rem;
  }

  button {
    font-size: 0.95rem;
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(145deg, #4caf50, #388e3c);
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 10px rgba(76,175,80,0.4);
    width: 100%;
    max-width: 320px;
  }
  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(76,175,80,0.55);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .mark-mode-on { background: linear-gradient(145deg, #2196f3, #1976d2) !important; }
  #clear-marks { background: linear-gradient(145deg, #9c27b0, #7b1fa2) !important; }
  #share-btn { background: linear-gradient(145deg, #039be5, #0288d1) !important; }
  #hint-btn { background: linear-gradient(145deg, #ff9800, #f57c00) !important; }

  #timer { font-size: 2rem; font-weight: bold; color: #ffeb3b; margin: 0.5rem 0; font-family: monospace; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }

  #puzzle-title-and-timer { display: flex; justify-content: center; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; }

  #status { font-size: 1.2rem; padding: 0.8rem; border-radius: 10px; min-height: 2.2rem; background: rgba(0,0,0,0.2); margin: 0.8rem 0; }

  #board {
    display: grid;
    gap: 4px;
    justify-content: center;
    margin: 1rem auto;
    padding: 1rem;
    background: rgba(255,255,255,0.08);
    border-radius: 14px;
    max-width: 90vw;
    width: min(90vw, 420px);
  }

  .cell {
    aspect-ratio: 1;
    background: linear-gradient(145deg, #ffffff22, #f0f8ff33);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.2rem, 3.5vw, 1.5rem);
    font-weight: bold;
    color: #111;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .cell:hover:not(.visited):not([data-mark-color]) { transform: scale(1.05); box-shadow: 0 5px 12px rgba(0,0,0,0.3); }
  .cell.visited { background: #777 !important; color: #aaa; transform: scale(0.95); cursor: default; }

  .cell.highlight { border-color: #ffeb3b !important; box-shadow: 0 0 18px #ffeb3b88, inset 0 0 9px #ffeb3b44; background: linear-gradient(145deg, #fffde7, #fff176) !important; animation: pulse 1.2s infinite; }
  .cell.hint { background: linear-gradient(145deg, #b3e5fc, #82b1ff) !important; border-color: #2196f3 !important; box-shadow: 0 0 18px #2196f388; animation: hint-pulse 1.5s infinite; }

  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  @keyframes hint-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  #back-btn { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); padding: 6px 12px; font-size: 0.9rem; }

  footer { font-size: 0.8rem; opacity: 0.8; margin-top: 2rem; text-align: center; position: fixed; bottom: 10px; left: 0; width: 100%; z-index: 50; }

  @media (max-width: 480px) {
    #board { gap: 3px; padding: 0.6rem; width: 96vw; }
    button { min-width: 0; width: 90%; max-width: none; padding: 12px 16px; }
    h1 { font-size: 1.8rem; }
    #timer { font-size: 1.6rem; }
    #stars { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div id="menu">
  <h1>Grasshopper Daily</h1>
  <p id="subtitle">Hand-crafted path puzzles – one per day</p>
  <div id="menu-buttons">
    <button onclick="startToday()">🎯 Play Today's Puzzle</button>
    <button onclick="showArchive()">📚 Play Previous Puzzles</button>
    <button onclick="showStats()">📊 View Stats</button>
    <button onclick="showHowTo()">❓ How to Play</button>
    <button onclick="showLegal()">📜 Legal & Contact</button>
  </div>
</div>

<!-- (All other containers unchanged - archive, stats, howto, legal, game, victory) -->

<div id="game-container" style="display:none">
  <!-- ... your existing game container code ... -->
</div>

<!-- Victory modal and footer remain the same -->

<script>
// Your full script remains exactly as before
// (including the already-solved logic and hint count in share)
</script>
</body>
</html>
