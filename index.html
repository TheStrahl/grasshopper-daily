<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grasshopper Daily – Path Puzzle</title>
<meta name="description" content="Grasshopper Daily is a free daily path puzzle game where you leap across a grid like a grasshopper. Solve hand-crafted puzzles, track your streaks, and share your results!">
<meta name="keywords" content="grasshopper daily, path puzzle, daily puzzle, logic game, jumping puzzle, brain teaser, free puzzle game">
<meta property="og:title" content="Grasshopper Daily – Path Puzzle">
<meta property="og:description" content="Leap across the grid in this daily path puzzle challenge. Visit every cell exactly once with strategic jumps!">
<meta property="og:url" content="https://grasshoppergame.com">
<meta property="og:type" content="website">
<meta property="og:image" content="https://grasshoppergame.com/favicon.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Grasshopper Daily – Path Puzzle">
<meta name="twitter:description" content="Leap across the grid in this daily path puzzle challenge. Visit every cell exactly once with strategic jumps!">
<meta name="twitter:image" content="https://grasshoppergame.com/favicon.png">

<style>
  body {
  font-family: system-ui, -apple-system, sans-serif;
  margin: 0;
  padding: 10px;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
}
h1 { margin: 0.3em 0; font-size: 2.1rem; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }
#subtitle { opacity: 0.9; margin-bottom: 1rem; font-size: 1rem; }

#menu, #game-container, #archive-container, #stats-container, #howto-container, #legal-container {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 1.5rem;
  margin: 1rem auto;
  max-width: 700px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

#menu-buttons {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 1rem;
}

#controls {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin: 1rem 0;
}

button {
  font-size: 0.95rem;
  padding: 8px 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(145deg, #4caf50, #388e3c);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 10px rgba(76,175,80,0.4);
  width: auto;
  min-width: 200px;
}
button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(76,175,80,0.55); }
button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

.mark-mode-on { background: linear-gradient(145deg, #2196f3, #1976d2) !important; }
#clear-marks { background: linear-gradient(145deg, #9c27b0, #7b1fa2) !important; }
#share-btn { background: linear-gradient(145deg, #039be5, #0288d1) !important; }
#hint-btn { background: linear-gradient(145deg, #ff9800, #f57c00) !important; }

#timer { font-size: 2rem; font-weight: bold; color: #ffeb3b; margin: 0.5rem 0; font-family: monospace; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }

#puzzle-title-and-timer { display: flex; justify-content: center; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; }

#status { font-size: 1.2rem; padding: 0.8rem; border-radius: 10px; min-height: 2.2rem; background: rgba(0,0,0,0.2); margin: 0.8rem 0; }

#board {
  display: grid;
  gap: 4px;
  justify-content: center;
  margin: 1rem auto;
  padding: 1rem;
  background: rgba(255,255,255,0.08);
  border-radius: 14px;
  max-width: 90vw;
  width: min(90vw, 420px);
}

.cell {
  aspect-ratio: 1;
  background: linear-gradient(145deg, #ffffff22, #f0f8ff33);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.2rem, 3.5vw, 1.5rem);
  font-weight: bold;
  color: #111;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.cell:hover:not(.visited):not([data-mark-color]) { transform: scale(1.05); box-shadow: 0 5px 12px rgba(0,0,0,0.3); }
.cell.visited { background: #777 !important; color: #aaa; transform: scale(0.95); cursor: default; }

.cell.highlight, .cell.hint { animation: pulse 1.2s infinite; }

.cell.hint {
  background: linear-gradient(145deg, #b3e5fc, #82b1ff) !important;
  border-color: #2196f3 !important;
  box-shadow: 0 0 18px #2196f388;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.cell[data-mark-color="1"] { border-color: #42a5f5 !important; background: linear-gradient(145deg, #e3f2fd, #90caf9) !important; }
.cell[data-mark-color="2"] { border-color: #66bb6a !important; background: linear-gradient(145deg, #e8f5e9, #a5d6a7) !important; }
.cell[data-mark-color="3"] { border-color: #ef5350 !important; background: linear-gradient(145deg, #ffebee, #ef9a9a) !important; }
.cell[data-mark-color="4"] { border-color: #ab47bc !important; background: linear-gradient(145deg, #f3e5f5, #ce93d8) !important; }

#back-btn { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); padding: 6px 12px; font-size: 0.9rem; }

#archive-days, #completed-puzzles { list-style: none; padding: 0; max-height: 60vh; overflow-y: auto; }
#archive-days li, #completed-puzzles li {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin: 8px 0;
  padding: 12px;
  transition: background 0.3s;
  cursor: pointer;
  font-size: 1rem;
}
#archive-days li:hover { background: rgba(255,255,255,0.2); }

#victory-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
#victory-content {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  text-align: center;
  max-width: 80%;
}
#victory-content h2 { margin-top: 0; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }
#victory-content p { font-size: 1.2rem; }

#close-modal { background: linear-gradient(145deg, #f44336, #d32f2f); margin-left: 8px; }

#stars { font-size: 1.5rem; color: #ffeb3b; margin: 0.5rem 0; }

footer {
  font-size: 0.8rem;
  opacity: 0.8;
  margin-top: 2rem;
  text-align: center;
  position: fixed;
  bottom: 10px;
  left: 0;
  width: 100%;
  z-index: 50;
}

@media (min-width: 768px) {
  #board { gap: 5px; padding: 1rem; max-width: 480px; }
  .cell { font-size: 1.6rem; }
}

@media (max-width: 480px) {
  #controls { flex-direction: column; align-items: center; gap: 8px; }
  button { width: 90%; max-width: 280px; }
  .cell { font-size: 1.2rem; }
  #board { gap: 2px; padding: 0.5rem 0; width: 95vw; }
  #menu-buttons button { min-width: 0; width: 90%; }
  h1 { font-size: 1.8rem; }
  #subtitle { font-size: 0.9rem; }
  #timer { font-size: 1.5rem; }
  #stars { font-size: 1.2rem; }
  #status { font-size: 1rem; }
  footer { font-size: 0.7rem; bottom: 5px; }
}
</style>
</head>
<body>

<div id="menu">
  <h1>Grasshopper Daily</h1>
  <p id="subtitle">Hand-crafted path puzzles – one per day</p>
  <div id="menu-buttons">
    <button onclick="startToday()">🎯 Play Today's Puzzle</button>
    <button onclick="showArchive()">📚 Play Previous Puzzles</button>
    <button onclick="showStats()">📊 View Stats</button>
    <button onclick="showHowTo()">❓ How to Play</button>
    <button onclick="showLegal()">📜 Legal & Contact</button>
  </div>
</div>

<!-- Archive, Stats, HowTo, Legal containers unchanged ... -->

<div id="game-container" style="display:none">
  <button id="back-btn" onclick="showMenu()">← Menu</button>

  <div id="puzzle-title-and-timer">
    <h2 id="puzzle-title">Puzzle</h2>
    <div id="timer">--:--</div>
  </div>

  <div id="stars">★★★</div>

  <div id="controls">
    <button id="undo-btn" onclick="undoMove()" disabled>↶ Undo</button>
    <button id="mark-toggle" onclick="toggleMarkMode()">✏️ Mark: OFF</button>
    <button id="clear-marks" onclick="clearMarks()" disabled>🧹 Clear Marks</button>
    <button onclick="resetPuzzle()">🔄 Restart</button>
    <button id="hint-btn" onclick="getHint()">💡 Hint</button>
  </div>

  <div id="status">Click any cell to begin</div>
  <div id="board"></div>
</div>

<div id="victory-modal">
  <div id="victory-content">
    <h2>🎉 Congratulations!</h2>
    <p>You solved the puzzle in <span id="victory-time"></span>!</p>
    <p id="victory-hints">Hints used: <span id="victory-hint-count">0</span></p>
    <button id="share-btn" onclick="shareResults()">📤 Share Results</button>
    <button id="close-modal" onclick="closeModal()">Close</button>
  </div>
</div>

<footer><a href="#" onclick="showLegal()">Legal & Contact</a></footer>

<script>
// ==================== STATE ====================
let currentPuzzle = null;
let visited, marked, currentPos, highlights, history = [], moveHistory = [], markMode = false;
let startTime, timerInterval, puzzleDateStr;
let solutionPath = [];
let hintCount = 0;
let isAlreadySolved = false;   // NEW

const LEVELS_FOLDER = './levels/';
const STATS_KEY = 'grasshopper_stats';

// ==================== HELPERS ====================
function getFileName(dateStr) {
  const [year, monthStr, dayStr] = dateStr.split('-');
  return `${parseInt(monthStr)}_${parseInt(dayStr)}_${year}.json`;
}

// ==================== LOAD PUZZLE ====================
async function loadPuzzle(puzzle, title, dateStr) {
  currentPuzzle = puzzle;
  puzzleDateStr = dateStr;
  solutionPath = puzzle.solution || [];
  hintCount = 0;
  isAlreadySolved = false;

  // Check if already completed
  const stats = JSON.parse(localStorage.getItem(STATS_KEY)) || {completed: {}};
  const saved = stats.completed[dateStr];

  if (saved) {
    isAlreadySolved = true;
    hintCount = saved.hints || 0;
    updateStars();

    // Auto-show victory modal with saved data
    document.getElementById('victory-time').textContent = formatTime(saved.time);
    document.getElementById('victory-hint-count').textContent = saved.hints || 0;
    document.getElementById('victory-modal').style.display = 'flex';

    // Load board in solved state
    visited = Array(puzzle.size).fill().map(() => Array(puzzle.size).fill(true));
    currentPos = {r: solutionPath.length ? solutionPath[solutionPath.length-1][0] : 0, c: solutionPath.length ? solutionPath[solutionPath.length-1][1] : 0};
  }

  document.getElementById('puzzle-title').textContent = title;
  resetPuzzle();   // this will respect isAlreadySolved

  // ... rest of loadPuzzle (show game container, start timer, etc.)
  document.getElementById('menu').style.display = 'none';
  // hide other containers...
  document.getElementById('game-container').style.display = 'block';

  if (!isAlreadySolved) {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      document.getElementById('timer').textContent = formatTime(Date.now() - startTime);
    }, 200);
  } else {
    document.getElementById('timer').textContent = formatTime(saved.time);
  }
}

// ==================== RESET (now respects already solved) ====================
function resetPuzzle() {
  const s = currentPuzzle.size;
  visited = Array(s).fill().map(()=>Array(s).fill(false));
  marked = Array(s).fill().map(()=>Array(s).fill(0));
  currentPos = {r:-1,c:-1};
  highlights = new Set();
  history = [];
  moveHistory = [];
  markMode = false;

  if (isAlreadySolved) {
    // Restore solved state
    visited = Array(s).fill().map(()=>Array(s).fill(true));
    currentPos = solutionPath.length ? {r: solutionPath[solutionPath.length-1][0], c: solutionPath[solutionPath.length-1][1]} : {r:0,c:0};
    document.getElementById('undo-btn').disabled = true;
    document.getElementById('hint-btn').disabled = true;
  } else {
    document.getElementById('undo-btn').disabled = true;
    document.getElementById('hint-btn').disabled = false;
  }

  document.getElementById('mark-toggle').textContent = '✏️ Mark: OFF';
  document.getElementById('mark-toggle').classList.remove('mark-mode-on');
  document.getElementById('clear-marks').disabled = true;
  document.getElementById('status').textContent = isAlreadySolved ? '✅ Already Solved!' : 'Click any cell to begin';

  drawBoard();
  updateHighlights();
}

// ==================== SHARE (now includes hint count) ====================
function shareResults() {
  const elapsed = isAlreadySolved 
    ? JSON.parse(localStorage.getItem(STATS_KEY)).completed[puzzleDateStr].time 
    : Date.now() - startTime;

  const timeStr = formatTime(elapsed);
  const [year, monthStr, dayStr] = puzzleDateStr.split('-');
  const month = parseInt(monthStr);
  const day = parseInt(dayStr);
  const shareDate = `${month}/${day}/${year}`;
  const size = currentPuzzle.size;
  const stars = 3 - Math.min(hintCount, 3);
  const starText = '★'.repeat(stars) + '☆'.repeat(3 - stars);

  const text = `🎉 Grasshopper Daily – ${shareDate} (${size}×${size}) Solved! ${starText}\n` +
               `⏱ Time: ${timeStr}\n` +
               `💡 Hints used: ${hintCount}\n` +
               `Play here: https://grasshoppergame.com\n#GrasshopperDaily`;

  navigator.clipboard.writeText(text).then(() => {
    alert('Copied to clipboard! Paste into Discord or X.');
  }).catch(() => {
    alert('Copy failed – please copy manually:\n' + text);
  });
}
