<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Conundrum • Grasshoppergame.com</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 10px;
    min-height: 100vh;
    background: linear-gradient(135deg, #2c3e50, #3498db);
    color: white;
    text-align: center;
  }
  h1 { font-size: 2.2rem; margin: 0.4em 0; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
  #subtitle { opacity: 0.9; margin-bottom: 1.5rem; }

  .container {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 1.5rem;
    margin: 1rem auto;
    max-width: 700px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  select, button {
    font-size: 1rem;
    padding: 10px 16px;
    border-radius: 12px;
    margin: 8px;
  }
  button {
    background: linear-gradient(145deg, #e67e22, #d35400);
    color: white;
    border: none;
    cursor: pointer;
    min-width: 180px;
  }
  button:hover { transform: translateY(-2px); }

  #level-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 20px;
  }
  .level-btn {
    padding: 16px 12px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .level-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
  .level-btn.complete { border-color: #2ecc71; background: rgba(46,204,113,0.2); }

  #clockCanvas {
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    background: #111;
  }

  #status { font-size: 1.3rem; margin: 15px 0; min-height: 1.8em; }
</style>
</head>
<body>

<div class="container">
  <h1>Clock Conundrum</h1>
  <p id="subtitle">FF XIII-2 Style Clock Puzzles</p>

  <div id="difficulty-select">
    <select id="difficulty-dropdown">
      <option value="Beginner">Beginner</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
      <option value="Insane">Insane</option>
    </select>
    <button onclick="loadDifficulty()">Load Difficulty</button>
  </div>

  <div id="level-select" style="display:none;">
    <h2 id="selected-difficulty"></h2>
    <div id="level-grid"></div>
    <button onclick="backToDifficulty()">← Back to Difficulty</button>
  </div>

  <div id="game-screen" style="display:none;">
    <button onclick="backToLevelSelect()">← Back to Levels</button>
    <h2 id="current-level-title"></h2>
    <canvas id="clockCanvas" width="500" height="500"></canvas>
    <div id="status">Click any node to begin</div>
    <button onclick="resetCurrentPuzzle()">🔄 Reset Puzzle</button>
  </div>

  <button onclick="window.location.href='index.html'">← Back to Grasshopper Daily</button>
</div>

<script>
// ==================== CONFIG ====================
const LEVELS_FOLDER = './Clock_Levels/';
const STATS_KEY = 'clockconundrum_stats';

// ==================== STATE ====================
let currentDifficulty = "Beginner";
let currentLevelData = null;
let currentLevelNum = 0;
let puzzleDateStr = null; // not used for daily, but kept for save key

// ==================== LOAD DIFFICULTY ====================
async function loadDifficulty() {
  currentDifficulty = document.getElementById('difficulty-dropdown').value;
  document.getElementById('selected-difficulty').textContent = currentDifficulty + " Levels";

  document.getElementById('difficulty-select').style.display = 'none';
  document.getElementById('level-select').style.display = 'block';

  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';

  // Try loading up to 30 levels per difficulty
  for (let i = 1; i <= 30; i++) {
    const num = i.toString().padStart(3, '0');
    const url = `${LEVELS_FOLDER}${currentDifficulty}/Level_${num}.json`;

    try {
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();

        const div = document.createElement('div');
        div.className = 'level-btn';
        div.innerHTML = `Level ${num}<br><small>Unplayed</small>`;

        // Check if completed
        const stats = JSON.parse(localStorage.getItem(STATS_KEY)) || {completed: {}};
        const key = `${currentDifficulty}_${num}`;
        if (stats.completed[key]) {
          div.classList.add('complete');
          div.innerHTML = `Level ${num}<br><small style="color:#2ecc71">Complete</small>`;
        }

        div.onclick = () => startLevel(data, i);
        grid.appendChild(div);
      }
    } catch(e) {}
  }
}

function backToDifficulty() {
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('difficulty-select').style.display = 'block';
}

// ==================== START LEVEL ====================
function startLevel(data, levelNum) {
  currentLevelData = data;
  currentLevelNum = levelNum;

  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('current-level-title').textContent = `${currentDifficulty} • Level ${levelNum.toString().padStart(3,'0')}`;

  drawClock();
}

// ==================== CLOCK DRAWING ====================
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');

function drawClock() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = 210;

  // Background circle
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 30, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();

  const numNodes = currentLevelData.numbers.length;
  const angleStep = (Math.PI * 2) / numNodes;

  for (let i = 0; i < numNodes; i++) {
    const angle = i * angleStep - Math.PI / 2;
    const x = cx + radius * Math.cos(angle);
    const y = cy + radius * Math.sin(angle);

    const value = currentLevelData.numbers[i];

    ctx.beginPath();
    ctx.arc(x, y, 32, 0, Math.PI * 2);
    ctx.fillStyle = value === 0 ? '#555' : '#00ffcc';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 5;
    ctx.stroke();

    ctx.fillStyle = '#000';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(value || '', x, y);
  }
}

function resetCurrentPuzzle() {
  // Reload the same level data to reset
  startLevel(currentLevelData, currentLevelNum);
}

// ==================== BACK BUTTONS ====================
function backToLevelSelect() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'block';
}

// ==================== INIT ====================
showMenu(); // placeholder - you can expand menu if wanted
</script>
</body>
</html>
