<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Conundrum • Grasshoppergame.com</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 10px;
    min-height: 100vh;
    background: linear-gradient(135deg, #2c3e50, #3498db);
    color: white;
    text-align: center;
  }
  h1 { font-size: 2.2rem; margin: 0.4em 0; text-shadow: 0 2px 8px rgba(0,0,0,0.6); }
  #subtitle { opacity: 0.9; margin-bottom: 1.5rem; }

  .container {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 1.5rem;
    margin: 1rem auto;
    max-width: 700px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  select, button {
    font-size: 1rem;
    padding: 10px 16px;
    border-radius: 12px;
    margin: 8px;
  }
  button {
    background: linear-gradient(145deg, #e67e22, #d35400);
    color: white;
    border: none;
    cursor: pointer;
    min-width: 180px;
  }
  button:hover { transform: translateY(-2px); }

  #clockContainer {
    margin: 20px auto;
    position: relative;
    width: 500px;
    height: 500px;
  }
  #clockCanvas {
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    background: #0a0a0a;
  }

  #status { font-size: 1.3rem; margin: 15px 0; min-height: 1.8em; }

  .back-btn {
    margin-top: 20px;
    background: #34495e;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Clock Conundrum</h1>
  <p id="subtitle">FF XIII-2 Style Clock Puzzles</p>

  <div id="difficulty-select">
    <select id="difficulty-dropdown">
      <option value="Beginner">Beginner</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
      <option value="Insane">Insane</option>
    </select>
    <button onclick="loadDifficulty()">Load Difficulty</button>
  </div>

  <div id="level-select" style="display:none;">
    <h2 id="selected-difficulty"></h2>
    <div id="level-grid"></div>
    <button onclick="backToDifficulty()">← Back to Difficulty</button>
  </div>

  <div id="game-screen" style="display:none;">
    <button onclick="backToLevelSelect()" class="back-btn">← Back to Levels</button>
    <h2 id="current-level-title"></h2>
    
    <div id="clockContainer">
      <canvas id="clockCanvas" width="500" height="500"></canvas>
    </div>

    <div id="status">Click any node to begin</div>
    <button onclick="resetCurrentPuzzle()">🔄 Reset Puzzle</button>
  </div>

  <button onclick="window.location.href='index.html'" class="back-btn">← Back to Grasshopper Daily</button>
</div>

<script>
// ==================== CONFIG ====================
const LEVELS_FOLDER = './Clock_Levels/';
const STATS_KEY = 'clockconundrum_stats';

// ==================== STATE ====================
let currentDifficulty = "Beginner";
let currentLevelData = null;
let currentLevelNum = 0;
let currentNumbers = [];
let currentSolutionOrder = [];
let isAlreadySolved = false;

// ==================== CANVAS SETUP ====================
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');
const cx = 250, cy = 250, radius = 200;

// ==================== LOAD DIFFICULTY & LEVELS ====================
async function loadDifficulty() {
  currentDifficulty = document.getElementById('difficulty-dropdown').value;
  document.getElementById('selected-difficulty').textContent = currentDifficulty + " Levels";

  document.getElementById('difficulty-select').style.display = 'none';
  document.getElementById('level-select').style.display = 'block';

  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';

  for (let i = 1; i <= 30; i++) {
    const num = i.toString().padStart(3, '0');
    const url = `${LEVELS_FOLDER}${currentDifficulty}/Level_${num}.json`;

    try {
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        const div = document.createElement('div');
        div.className = 'level-btn';
        div.innerHTML = `Level ${num}<br><small>Unplayed</small>`;

        const stats = JSON.parse(localStorage.getItem(STATS_KEY)) || {completed: {}};
        const key = `${currentDifficulty}_${num}`;
        if (stats.completed[key]) {
          div.classList.add('complete');
          div.innerHTML = `Level ${num}<br><small style="color:#2ecc71">Complete</small>`;
        }

        div.onclick = () => startLevel(data, i);
        grid.appendChild(div);
      }
    } catch(e) {}
  }
}

function backToDifficulty() {
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('difficulty-select').style.display = 'block';
}

// ==================== START LEVEL ====================
function startLevel(data, levelNum) {
  currentLevelData = data;
  currentLevelNum = levelNum;
  currentNumbers = [...data.numbers];
  currentSolutionOrder = data.solution ? [...data.solution] : [];

  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('current-level-title').textContent = `${currentDifficulty} • Level ${levelNum.toString().padStart(3,'0')}`;

  drawClock();
}

// ==================== DRAW CLOCK (with hands + legal highlight) ====================
function drawClock() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Main clock face
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 30, 0, Math.PI * 2);
  ctx.fillStyle = '#111111';
  ctx.fill();
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 20;
  ctx.stroke();

  const numNodes = currentNumbers.length;
  const angleStep = (Math.PI * 2) / numNodes;

  // Draw nodes + highlight legal ones
  let legalNodes = [];
  if (currentSolutionOrder.length > 0 && currentSolutionOrder.length < numNodes) {
    const last = currentSolutionOrder[currentSolutionOrder.length - 1];
    const step = currentNumbers[last];
    for (let i = 0; i < numNodes; i++) {
      if (currentNumbers[i] !== 0) continue;
      const diff = Math.abs(i - last);
      if (Math.min(diff, numNodes - diff) === step) legalNodes.push(i);
    }
  }

  for (let i = 0; i < numNodes; i++) {
    const angle = i * angleStep - Math.PI / 2;
    const x = cx + radius * Math.cos(angle);
    const y = cy + radius * Math.sin(angle);

    const isLegal = legalNodes.includes(i);
    const isFilled = currentNumbers[i] !== 0;

    // Node
    ctx.beginPath();
    ctx.arc(x, y, 28, 0, Math.PI * 2);
    ctx.fillStyle = isFilled ? '#00cc88' : (isLegal ? '#44ff88' : '#555555');
    ctx.fill();
    ctx.strokeStyle = isLegal ? '#aaffaa' : '#ffffff';
    ctx.lineWidth = isLegal ? 6 : 3;
    ctx.stroke();

    // Number
    ctx.fillStyle = '#000';
    ctx.font = 'bold 26px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentNumbers[i] || '', x, y);
  }

  // Draw Hands
  if (currentSolutionOrder.length > 0) {
    const hourPos = currentSolutionOrder[currentSolutionOrder.length - 1];
    const minutePos = (hourPos + currentNumbers[hourPos]) % numNodes;

    drawHand(hourPos, '#ffdd00', 8, 0.75);   // Hour hand (thicker, shorter)
    drawHand(minutePos, '#00ddff', 5, 0.92); // Minute hand
  }
}

function drawHand(pos, color, width, lengthFactor) {
  const numNodes = currentNumbers.length;
  const angleStep = (Math.PI * 2) / numNodes;
  const angle = pos * angleStep - Math.PI / 2;

  const x = cx + radius * lengthFactor * Math.cos(angle);
  const y = cy + radius * lengthFactor * Math.sin(angle);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// ==================== CLICK HANDLING ====================
canvas.addEventListener('click', (e) => {
  if (!currentLevelData) return;

  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  const numNodes = currentNumbers.length;
  const angleStep = (Math.PI * 2) / numNodes;

  for (let i = 0; i < numNodes; i++) {
    const angle = i * angleStep - Math.PI / 2;
    const nodeX = cx + radius * Math.cos(angle);
    const nodeY = cy + radius * Math.sin(angle);

    const dist = Math.hypot(clickX - nodeX, clickY - nodeY);
    if (dist < 35) {  // clicked this node
      handleNodeClick(i);
      return;
    }
  }
});

function handleNodeClick(index) {
  if (currentNumbers[index] !== 0) return; // already filled

  if (currentSolutionOrder.length > 0) {
    const last = currentSolutionOrder[currentSolutionOrder.length - 1];
    const step = currentNumbers[last];
    const diff = Math.abs(index - last);
    if (Math.min(diff, currentNumbers.length - diff) !== step) {
      alert("Illegal move! Must be exactly the step value away.");
      return;
    }
  }

  const num = prompt("Enter number (1-9):", "");
  const val = parseInt(num);
  if (val >= 1 && val <= 9) {
    currentNumbers[index] = val;
    currentSolutionOrder.push(index);
    drawClock();

    if (currentNumbers.every(n => n !== 0)) {
      // Puzzle complete!
      const timeTaken = 999; // placeholder - you can add real timer later
      saveCompletion(timeTaken);
      showVictory();
    }
  }
}

function showVictory() {
  alert(`🎉 Level Complete!\nTime: ${formatTime(999)}\nHints used: 0\n\n(Share feature coming next)`);
  backToLevelSelect();
}

// ==================== OTHER FUNCTIONS ====================
function resetCurrentPuzzle() {
  currentNumbers = [...currentLevelData.numbers];
  currentSolutionOrder = [];
  drawClock();
}

function backToLevelSelect() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'block';
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}

function saveCompletion(time) {
  const stats = JSON.parse(localStorage.getItem(STATS_KEY)) || {completed: {}};
  const key = `${currentDifficulty}_${currentLevelNum.toString().padStart(3,'0')}`;
  stats.completed[key] = {time: time, hints: 0};
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

// Init - start with difficulty select
document.getElementById('difficulty-select').style.display = 'block';
</script>
</body>
</html>
